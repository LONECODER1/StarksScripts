version: '3.8'

services:
  # Database Service (PostgreSQL)
  db:
    image: postgres:16-alpine
    container_name: starkscripts-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localpassword
      POSTGRES_DB: starkscripts
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Redis Service
  redis:
    image: redis:7-alpine
    container_name: starkscripts-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Web Application Service
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: starkscripts-app
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - db
      - redis
    environment:
      - PORT=3000
      # Connect to the 'db' service in the docker network
      - DATABASE_URI=postgresql://postgres:localpassword@db:5432/starkscripts
      - DATABASE_URL=postgresql://postgres:localpassword@db:5432/starkscripts
      - REDIS_USERNAME=default
      - REDIS_PASSWORD=
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      # Add other OAuth or SMTP credentials here if needed
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}

volumes:
  postgres_data:
  redis_data:
